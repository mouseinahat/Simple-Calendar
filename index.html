<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel user-panel">
      <h1>Simple Calendar</h1>
      <p class="subtitle">Pick your available dates. Everyone using the same room link can see updates.</p>

      <div class="form-grid">
        <label>
          Your name
          <input id="userName" type="text" placeholder="Enter your name" />
        </label>

        <label>
          Your color
          <input id="userColor" type="color" value="#4f46e5" />
        </label>

        <label>
          Room ID
          <input id="roomId" type="text" value="default-room" />
        </label>
      </div>

      <div class="actions">
        <button id="saveProfileBtn">Save Profile</button>
        <button id="clearMyDatesBtn" class="secondary">Clear My Dates</button>
      </div>

      <p id="statusMessage" class="status">Enter your name and choose dates.</p>
    </section>

    <section class="calendar-card">
      <header class="calendar-header">
        <button id="prevMonthBtn" class="nav-btn" aria-label="Previous month">‹</button>
        <h2 id="monthLabel">Month Year</h2>
        <button id="nextMonthBtn" class="nav-btn" aria-label="Next month">›</button>
      </header>

      <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <section class="panel legend-panel">
      <h2>People</h2>
      <div id="legendList" class="legend-list"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
